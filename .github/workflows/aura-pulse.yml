name: Aura-V 2.0 Pulse Relay

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulse-relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests numpy

      - name: Execute Aura-V Pulse + Trade Logger
        env:
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
          DISCORD_WEBHOOK_TRADE_LOG: https://discord.com/api/webhooks/1485448651362013194/2goZ_3_asEnwJQeraqB2nLQXRCrtkyYKg7lhNC7K-qHDdXHyLyQs-13eIuNpCO1ZvYx3
        run: |
          cp trade_logger.py . 2>/dev/null || true
          python alert_relay.py

      - name: Commit Data Update
        run: |
          git config --local user.email "aura@clawdbot.com"
          git config --local user.name "Aura Relay"
          git add pulse_log.json trade_log.json trade_state.json 2>/dev/null || git add -A
          git diff --staged --quiet || git commit -m "Pulse Update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
