name: Daily Digest — #daily-digest Post

on:
  schedule:
    - cron: '0 13 * * *'   # 1:00 PM UTC = 7:00 AM CST — morning brief
    - cron: '0 23 * * *'   # 11:00 PM UTC = 5:00 PM CST — EOD wrap
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Post Daily Digest to #daily-digest
        run: python daily_digest.py
