<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Kombat | Puppet FX Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    
    <div class="content">
        <h1 style="color:#f6c453; font-size: 42px; margin-top: 30px;">MARKET KOMBAT: PUPPET ARENA</h1>
        <p id="timer" style="opacity:0.7;">Initializing High-Detail Rig...</p>

        <div class="arena">
            <div id="bullzen-puppet" class="fighter-puppet">
                <div id="part-arm-l" class="puppet-part"></div>
                <div id="part-torso" class="puppet-part"></div>
                <div id="part-head" class="puppet-part"></div>
                <div id="part-arm-r" class="puppet-part"></div>
            </div>

            <div class="vs">VS</div>

            <div id="bearaku-puppet" class="fighter-puppet">
                <div id="part-arm-l" class="puppet-part"></div>
                <div id="part-torso" class="puppet-part"></div>
                <div id="part-head" class="puppet-part"></div>
                <div id="part-arm-r" class="puppet-part"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item"><div id="price" class="val">---</div></div>
            <div class="stat-item"><div id="winner" class="val">NEUTRAL</div></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
